<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Games • New Resident Yogyakarta</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="games.css" />
</head>
<body>
  <div class="gameWrap">

    <!-- TOP -->
    <header class="gameTop">
      <div class="brand">
        <b>New Resident</b>
        <small>YOGYAKARTA</small>
      </div>

      <nav class="nav">
        <a href="index.html">Beranda</a>
        <a href="quotes.html">Quotes</a>
        <a href="confession.html">Confession</a>
        <a href="event.html">Event</a>
        <a class="active" href="games.html">Games</a>
      </nav>
    </header>

    <!-- MAIN -->
    <main class="gameMain">
      <section class="centerCol">

        <!-- JOIN CARD -->
        <div id="joinCard" class="card joinCard">
          <h2 class="joinTitle">Cerdas Cermat (Live)</h2>
          <p class="joinDesc">
            Masukkan kode room dari admin dan nickname kamu.
          </p>

          <div class="joinGrid">
            <div class="field">
              <label for="roomCode">Kode Room</label>
              <input id="roomCode" type="text" placeholder="ABCDE1" autocomplete="off" />
            </div>

            <div class="field">
              <label for="nickname">Nickname</label>
              <input id="nickname" type="text" placeholder="nama kamu" autocomplete="off" />
            </div>
          </div>

          <div class="joinActions">
            <button id="joinBtn" type="button">Join</button>
            <div id="joinStatus"></div>
          </div>
        </div>

        <!-- GAME CARD -->
        <div id="gameCard" class="stage4" hidden>

          <!-- ATAS: SOAL -->
          <section class="card stage-q">
            <div class="qCard">
              <div class="qTopBar">
                <div class="roomMeta">
                  <div><b>Room:</b> <span id="roomLabel">-</span></div>
                  <div id="gameStatus">—</div>
                </div>

                <button id="leaveBtn" class="btnMini" type="button">Keluar</button>
              </div>

              <div class="qLabel">PERTANYAAN</div>
              <div id="qText" class="qBig">—</div>

              <div class="qDivider"></div>

              <button id="buzzBtn" class="buzzBig" type="button" disabled>BUZZ</button>
              <div id="buzzInfo" class="buzzInfo"></div>
              <div id="buzzOwner" class="buzzOwner">Belum ada pemenang buzz.</div>
              <div id="buzzTimer" class="buzzTimer"></div>
            </div>
          </section>

          <!-- KIRI BAWAH: PLAYERS -->
          <aside class="card stage-lb">
            <div class="lbHead">
              <div>
                <b>Players</b><br />
                <small id="lbStatus">—</small>
              </div>
              <div id="meTag">—</div>
            </div>

            <div class="lbBody" id="lbList">
              <div class="lb-item">
                <div class="muted">Belum ada peserta.</div>
              </div>
            </div>
          </aside>

          <!-- KANAN BAWAH: FEED PANEL -->
          <section class="card stage-feed">
            <div class="mobileSwitch">
              <button id="switchJawaban" class="active" type="button">Jawaban</button>
              <button id="switchObrolan" type="button">Obrolan</button>
            </div>

            <!-- PANEL JAWABAN -->
            <div id="panelJawabanMobile" class="feedPanel active">
              <div class="panelTitle">JAWABAN</div>

              <div id="feedStatus" class="panelStatus"></div>

              <div id="feedList">
                <div class="ansItem">
                  <span style="opacity:.75">Belum ada jawaban.</span>
                </div>
              </div>

              <div id="answerBox" data-disabled="1">
                <div class="pillWrap">
                  <textarea
                    id="answerText"
                    placeholder="Tulis jawaban..."
                    disabled
                  ></textarea>
                  <button id="sendAnswerBtn" type="button" disabled>Kirim</button>
                </div>
                <div id="answerStatus"></div>
              </div>
            </div>

            <!-- PANEL OBROLAN -->
            <div id="panelObrolanMobile" class="feedPanel">
              <div class="panelTitle">OBROLAN</div>

              <div id="chatList" class="chatList">
                <div class="ansItem">
                  <span style="opacity:.75">Belum ada chat.</span>
                </div>
              </div>

              <div id="chatBox" class="chatBox" data-disabled="0">
                <div class="pillWrap">
                  <textarea
                    id="chatText"
                    placeholder="Tulis chat..."
                    maxlength="300"
                  ></textarea>
                  <button id="sendChatBtn" type="button">Kirim</button>
                </div>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <!-- END OVERLAY -->
  <div id="endOverlay">
    <div class="overlayBox">
      <div class="overlayHead">
        <div>
          <div class="overlayTitle">Sesi Berakhir</div>
          <div id="finalSub" class="overlaySub">—</div>
        </div>
        <button id="closeOverlay" type="button" title="Tutup">✕</button>
      </div>

      <div id="finalList"></div>
    </div>
  </div>

  <script>
    // switch panel mobile/desktop kanan bawah
    const switchJawaban = document.getElementById("switchJawaban");
    const switchObrolan = document.getElementById("switchObrolan");
    const panelJawabanMobile = document.getElementById("panelJawabanMobile");
    const panelObrolanMobile = document.getElementById("panelObrolanMobile");

    function setFeedPanel(which) {
      const isJawaban = which === "jawaban";

      switchJawaban?.classList.toggle("active", isJawaban);
      switchObrolan?.classList.toggle("active", !isJawaban);

      panelJawabanMobile?.classList.toggle("active", isJawaban);
      panelObrolanMobile?.classList.toggle("active", !isJawaban);
    }

    switchJawaban?.addEventListener("click", () => setFeedPanel("jawaban"));
    switchObrolan?.addEventListener("click", () => setFeedPanel("obrolan"));
  </script>

  <script type="module" src="games.js"></script>
</body>
</html>
