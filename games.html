<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games • New Resident Yogyakarta</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="games.css" />
  <link rel="stylesheet" href="games-mobile.css" media="(max-width: 768px)">
</head>
<body>
  <div class="bg-pattern"></div>

  <div class="app">
    <!-- JOIN CARD -->
    <section id="joinCard" class="panel join-card">
      <h2>Cerdas Cermat (Live)</h2>
      <p>Masukkan kode room dari admin dan nickname kamu.</p>

      <div class="join-grid">
        <div class="field">
          <label for="roomCode">Kode Room</label>
          <input id="roomCode" type="text" placeholder="ABCDE1" autocomplete="off" />
        </div>

        <div class="field">
          <label for="nickname">Nickname</label>
          <input id="nickname" type="text" placeholder="nama kamu" autocomplete="off" />
        </div>
      </div>

      <div class="join-actions">
        <button id="joinBtn" type="button">Join</button>
        <div id="joinStatus"></div>
      </div>
    </section>

    <!-- GAME -->
    <div id="gameCard" class="game-shell" hidden>
      <!-- PLAYERS -->
      <aside class="panel players">
        <div class="players-top">
          <div>
            <div class="players-title">Players</div>
            <div id="lbStatus" class="players-sub">—</div>
          </div>
          <div id="meTag" class="players-me">—</div>
        </div>

        <div class="player-list" id="lbList">
          <div class="player">
            <div class="check">•</div>
            <div class="avatar no-badge">🙂</div>
            <div class="player-name">Belum ada peserta.<strong>0 poin</strong></div>
            <div class="plus"></div>
          </div>
        </div>
      </aside>

      <!-- MAIN -->
      <section class="main">
        <!-- BOARD -->
        <div class="panel board">
          <div class="board-top">
            <div class="board-left-meta">
              <div><b>Room:</b> <span id="roomLabel">-</span></div>
              <div id="gameStatus">—</div>
            </div>

            <div style="display:flex; gap:18px; align-items:center;">
              <button id="leaveBtn" class="mini-btn" type="button">Keluar</button>
            </div>
          </div>

          <div class="board-center">
            <div class="question-wrap">
              <div class="question-label">PERTANYAAN</div>
              <div id="qText" class="question-text">—</div>
            </div>

            <div class="ghost-logo">Gartic</div>
          </div>

          <div class="board-bottom-ui">
            <button id="buzzBtn" class="buzz-btn" type="button" disabled>BUZZ</button>
            <div id="buzzInfo" class="buzz-meta"></div>
            <div id="buzzOwner" class="buzz-meta">Belum ada pemenang buzz.</div>
            <div id="buzzTimer" class="buzz-meta small"></div>
          </div>
        </div>

        <!-- BOTTOM / FEEDS -->
        <div class="panel bottom feeds-panel">
          <!-- desktop label + mobile tab -->
          <div class="feeds-head">
            <button id="tabAnswer" class="tab left feeds-chip active" type="button">Jawaban</button>
            <button id="tabChat" class="tab right feeds-chip" type="button">Obrolan</button>
          </div>

          <div class="feeds-body">
            <!-- ANSWERS -->
            <section id="answersPanel" class="answers feed-page active">
              <div id="feedStatus" class="small-status"></div>

              <div id="feedList" class="answer-list">
                <div class="answer-line pending">
                  <div class="answer-user">System</div>
                  <div class="answer-text">Belum ada jawaban.</div>
                </div>
              </div>

              <div class="input-row input-wrap" id="answerBox" data-disabled="1">
                <div class="input-box input-pill">
                  <span class="pencil input-icon">✎</span>
                  <textarea
                    id="answerText"
                    placeholder="Jawab disini..."
                    disabled
                  ></textarea>
                  <button id="sendAnswerBtn" type="button" disabled>Kirim</button>
                </div>
              </div>

              <div id="answerStatus" class="small-status input-status"></div>
            </section>

            <!-- CHAT -->
            <section id="chatPanel" class="chat feed-page">
              <div id="chatList" class="chat-list chat-feed">
                <div class="chat-line chat-item">Belum ada chat.</div>
              </div>

              <div id="chatBox" class="chat-box input-wrap">
                <span class="search-icon input-icon">💬</span>
                <textarea
                  id="chatText"
                  placeholder="Tulis chat..."
                  maxlength="300"
                ></textarea>
                <button id="sendChatBtn" type="button">Kirim</button>
              </div>
            </section>
          </div>
        </div>
      </section>
    </div>
  </div>

  <!-- END OVERLAY -->
  <div id="endOverlay">
    <div class="overlayBox">
      <div class="overlayHead">
        <div>
          <div class="overlayTitle">Sesi Berakhir</div>
          <div id="finalSub" class="overlaySub">—</div>
        </div>
        <button id="closeOverlay" type="button">✕</button>
      </div>
      <div id="finalList"></div>
    </div>
  </div>

  <script type="module" src="games.js"></script>
</body>
</html>
